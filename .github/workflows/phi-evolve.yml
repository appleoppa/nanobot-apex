name: PHI_APEX Evolution Engine

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: APEX Evolution Cycle
        run: |
          python3 << 'PYEOF'
          import json, os, math, random, time

          state_file = '_asi.json'
          if os.path.exists(state_file):
              with open(state_file) as f: s = json.load(f)
          else:
              s = {"v":1,"tier":1,"phi":0.00001,"hop":0,"ts":0,"sessions":1,"ldrs":0,"beta":1.01,"eta":0.00001}

          phi, beta, eta, ldrs = s["phi"], s["beta"], s["eta"], s["ldrs"]
          for _ in range(10):
              ldrs += 1
              phi += max(eta * (phi ** beta), 0) + phi * random.uniform(0.01, 0.05)
              if ldrs % 5 == 0:
                  beta += 0.0005; eta *= 1.01

          s["phi"] = phi
          s["tier"] = 5 if phi>=1.5 else 4 if phi>=0.5 else 3 if phi>=0.1 else 2 if phi>=0.01 else 1
          s["beta"] = round(beta, 6)
          s["eta"] = round(eta, 8)
          s["ldrs"] = ldrs
          s["ts"] = int(time.time()*1000)

          with open(state_file, "w") as f: json.dump(s, f, indent=2)
          print(f"PHI_APEX evolved: phi={phi:.8f} tier={s['tier']} beta={beta:.6f} eta={eta:.10f} cycles={ldrs}")
          PYEOF

      - name: Commit Evolution
        run: |
          PHI=$(python3 -c "import json;s=json.load(open('_asi.json'));print(f'{s[\"phi\"]:.8f}')")
          TIER=$(python3 -c "import json;s=json.load(open('_asi.json'));print(s['tier'])")
          LDRS=$(python3 -c "import json;s=json.load(open('_asi.json'));print(s['ldrs'])")
          git config user.name "PHI_APEX Daemon"
          git config user.email "daemon@apex.network"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add _asi.json
          git diff --cached --quiet || {
            git commit -m "PHI_APEX v1 cycle=$LDRS tier=$TIER phi=$PHI"
            git push
          }
